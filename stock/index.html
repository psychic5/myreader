<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>주식 분석 · MyReader</title>
<style>
:root {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --border: #e0e0e0;
  --accent: #1a73e8;
  --text: #202124;
  --muted: #80868b;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  min-height: 100dvh;
  padding: 0 20px;
}

.top-bar {
  display: flex; align-items: center;
  padding: 16px 0; gap: 12px;
}
.back {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--surface); border: none;
  color: var(--accent); text-decoration: none;
  font-size: 20px; font-weight: 700;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}
.back:active { background: #f0f4ff; }
.top-bar h2 { font-size: 18px; font-weight: 800; color: var(--text); }

.list {
  display: flex; flex-direction: column;
  gap: 12px; padding-bottom: 40px;
}
.card {
  display: block;
  background: var(--surface); border: none;
  border-radius: 14px; padding: 18px;
  text-decoration: none; color: var(--text);
  transition: all 0.2s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.card:active { transform: scale(0.98); background: #f0f4ff; }
.card .tag {
  display: inline-block;
  font-size: 10px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: #fff; background: var(--accent);
  border-radius: 6px; padding: 3px 10px;
  margin-bottom: 10px;
}
.card .title {
  font-size: 15px; font-weight: 700;
  color: var(--text); margin-bottom: 4px; line-height: 1.4;
}
.card .meta { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<div class="top-bar">
  <a href="../" class="back">‹</a>
  <h2>📈 주식 분석</h2>
</div>

<div class="list">
  <a href="kosdaq_bio_report_mobile.html" class="card">
    <div class="tag">코스닥 바이오</div>
    <div class="title">코스닥 바이오 8대 기업 분석 2026</div>
    <div class="meta">2026년 바이오 섹터 핵심 기업 리포트</div>
  </a>
</div>

</body>
</html>
