<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>주식 분석 · MyReader</title>
<style>
:root {
  --bg: #0a0e17;
  --surface: #111827;
  --border: #1e2d45;
  --accent: #00d4aa;
  --text: #e2e8f0;
  --muted: #64748b;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  min-height: 100dvh;
  padding: 0 20px;
}

.top-bar {
  display: flex;
  align-items: center;
  padding: 16px 0;
  gap: 12px;
}
.back {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  text-decoration: none;
  font-size: 18px;
}
.back:active { background: #1a2235; }
.top-bar h2 {
  font-size: 18px;
  font-weight: 800;
  color: #fff;
}

.list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 40px;
}

.card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  text-decoration: none;
  color: var(--text);
  transition: all 0.2s ease;
}
.card:active {
  transform: scale(0.98);
  background: #1a2235;
}
.card .tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
  background: rgba(0,212,170,0.12);
  border-radius: 6px;
  padding: 3px 8px;
  margin-bottom: 10px;
}
.card .title {
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
  line-height: 1.4;
}
.card .meta {
  font-size: 11px;
  color: var(--muted);
}
</style>
</head>
<body>

<div class="top-bar">
  <a href="../" class="back">‹</a>
  <h2>📈 주식 분석</h2>
</div>

<div class="list">
  <a href="kosdaq_bio_report_mobile.html" class="card">
    <div class="tag">코스닥 바이오</div>
    <div class="title">코스닥 바이오 8대 기업 분석 2026</div>
    <div class="meta">2026년 바이오 섹터 핵심 기업 리포트</div>
  </a>
</div>

</body>
</html>
