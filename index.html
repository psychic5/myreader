<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MyReader</title>
<style>
:root {
  --bg: #0a0e17;
  --surface: #111827;
  --border: #1e2d45;
  --accent: #00d4aa;
  --text: #e2e8f0;
  --muted: #64748b;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 20px;
}

.header {
  text-align: center;
  padding: 60px 0 40px;
}
.header h1 {
  font-size: 28px;
  font-weight: 900;
  color: #fff;
  margin-bottom: 8px;
}
.header p {
  font-size: 13px;
  color: var(--muted);
}

.menu {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.menu-btn {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  text-decoration: none;
  color: var(--text);
  transition: all 0.2s ease;
  -webkit-user-select: none;
  user-select: none;
}
.menu-btn:active {
  transform: scale(0.97);
  background: #1a2235;
}
.menu-btn .icon {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.menu-btn .info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
.menu-btn .info .title {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
}
.menu-btn .info .desc {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.menu-btn .arrow {
  margin-left: auto;
  color: var(--muted);
  font-size: 18px;
  flex-shrink: 0;
}

/* 카테고리별 아이콘 배경색 */
.icon-stock { background: linear-gradient(135deg, #00d4aa22, #00d4aa44); }

.footer {
  margin-top: auto;
  padding: 40px 0 32px;
  text-align: center;
  font-size: 11px;
  color: var(--muted);
}
</style>
</head>
<body>

<div class="header">
  <h1>📚 MyReader</h1>
  <p>분석 리포트 모음</p>
</div>

<div class="menu">
  <a href="stock/" class="menu-btn">
    <div class="icon icon-stock">📈</div>
    <div class="info">
      <div class="title">주식 분석</div>
      <div class="desc">코스닥 바이오 기업 분석 리포트</div>
    </div>
    <div class="arrow">›</div>
  </a>
</div>

<div class="footer">MyReader · psychic5</div>

</body>
</html>
