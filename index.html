<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MyReader</title>
<style>
:root {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --border: #e0e0e0;
  --accent: #1a73e8;
  --accent-dark: #0d47a1;
  --text: #202124;
  --muted: #80868b;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 20px;
}

/* 잠금 화면 */
.lock-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  gap: 20px;
}
.lock-icon { font-size: 48px; margin-bottom: 4px; }
.lock-title { font-size: 20px; font-weight: 800; color: var(--text); }
.pin-wrap { display: flex; gap: 14px; margin: 8px 0; }
.pin-dot {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2.5px solid #ccc;
  transition: all 0.2s;
}
.pin-dot.filled { background: var(--accent); border-color: var(--accent); }
.numpad {
  display: grid;
  grid-template-columns: repeat(3, 72px);
  gap: 12px; margin-top: 8px;
}
.num-btn {
  width: 72px; height: 72px; border-radius: 50%;
  border: none;
  background: #ffffff;
  color: var(--text);
  font-size: 26px; font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-user-select: none; user-select: none;
  transition: all 0.15s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.num-btn:active {
  background: var(--accent); color: #fff;
  transform: scale(0.92);
}
.num-btn.empty { visibility: hidden; box-shadow: none; }
.num-btn.del { font-size: 18px; color: var(--muted); }
.lock-error { color: #d93025; font-size: 13px; height: 20px; font-weight: 500; }

/* 메인 */
.main-content {
  display: none;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

.header {
  text-align: center;
  padding: 56px 0 36px;
}
.header h1 {
  font-size: 28px; font-weight: 900;
  color: var(--text); margin-bottom: 6px;
}
.header p { font-size: 13px; color: var(--muted); }

.menu {
  width: 100%; max-width: 400px;
  display: flex; flex-direction: column; gap: 14px;
}
.menu-btn {
  display: flex; align-items: center; gap: 16px;
  background: var(--surface);
  border: none;
  border-radius: 16px; padding: 20px;
  text-decoration: none; color: var(--text);
  transition: all 0.2s ease;
  -webkit-user-select: none; user-select: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.menu-btn:active { transform: scale(0.97); background: #f0f4ff; }
.menu-btn .icon {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.menu-btn .info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.menu-btn .info .title { font-size: 16px; font-weight: 700; color: var(--text); }
.menu-btn .info .desc {
  font-size: 12px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.menu-btn .arrow { margin-left: auto; color: var(--accent); font-size: 20px; font-weight: 700; flex-shrink: 0; }

.icon-stock { background: #1a73e8; color: #fff !important; font-size: 22px !important; }

.footer {
  margin-top: auto; padding: 40px 0 32px;
  text-align: center; font-size: 11px; color: var(--muted);
}
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">비밀번호 입력</div>
  <div class="pin-wrap" id="pinDots">
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
  </div>
  <div class="lock-error" id="lockError"></div>
  <div class="numpad">
    <div class="num-btn" onclick="pressKey('1')">1</div>
    <div class="num-btn" onclick="pressKey('2')">2</div>
    <div class="num-btn" onclick="pressKey('3')">3</div>
    <div class="num-btn" onclick="pressKey('4')">4</div>
    <div class="num-btn" onclick="pressKey('5')">5</div>
    <div class="num-btn" onclick="pressKey('6')">6</div>
    <div class="num-btn" onclick="pressKey('7')">7</div>
    <div class="num-btn" onclick="pressKey('8')">8</div>
    <div class="num-btn" onclick="pressKey('9')">9</div>
    <div class="num-btn empty"></div>
    <div class="num-btn" onclick="pressKey('0')">0</div>
    <div class="num-btn del" onclick="pressDelete()">⌫</div>
  </div>
</div>

<div class="main-content" id="mainContent">
  <div class="header">
    <h1>📚 MyReader</h1>
    <p>분석 리포트 모음</p>
  </div>
  <div class="menu">
    <a href="stock/" class="menu-btn">
      <div class="icon icon-stock">📈</div>
      <div class="info">
        <div class="title">주식 분석</div>
        <div class="desc">코스닥 바이오 기업 분석 리포트</div>
      </div>
      <div class="arrow">›</div>
    </a>
  </div>
  <div class="footer">MyReader · psychic5</div>
</div>

<script>
const PIN = '5248';
let input = '';
const dots = document.querySelectorAll('.pin-dot');

function updateDots() {
  dots.forEach((d, i) => d.classList.toggle('filled', i < input.length));
}

function pressKey(n) {
  if (input.length >= 4) return;
  input += n;
  updateDots();
  document.getElementById('lockError').textContent = '';
  if (input.length === 4) {
    setTimeout(() => {
      if (input === PIN) {
        sessionStorage.setItem('unlocked', '1');
        unlock();
      } else {
        document.getElementById('lockError').textContent = '비밀번호가 틀렸습니다';
        input = '';
        updateDots();
        document.getElementById('lockScreen').style.animation = 'shake 0.3s';
        setTimeout(() => document.getElementById('lockScreen').style.animation = '', 300);
      }
    }, 150);
  }
}

function pressDelete() {
  input = input.slice(0, -1);
  updateDots();
  document.getElementById('lockError').textContent = '';
}

function unlock() {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('mainContent').style.display = 'flex';
}

if (sessionStorage.getItem('unlocked') === '1') unlock();
</script>
<style>
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
</style>
</body>
</html>
